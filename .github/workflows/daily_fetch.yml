name: Daily Fetch

on:
  schedule:
    # Runs every day at 07:00 UTC (09:00 Madrid time)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit and push data/articles_week.json after this manual run"
        required: false
        type: boolean
        default: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    concurrency:
      group: content-store-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write  # Required to commit the updated articles_week.json

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py --mode daily

      - name: Commit updated weekly store
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.commit_changes }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles_week.json
          if git diff --cached --quiet; then
            echo "No weekly store changes to commit."
            exit 0
          fi
          git commit -m "chore: update weekly article store [skip ci]"
          git fetch origin "${{ github.ref_name }}"
          git rebase --autostash "origin/${{ github.ref_name }}"
          git push origin HEAD:${{ github.ref_name }}
