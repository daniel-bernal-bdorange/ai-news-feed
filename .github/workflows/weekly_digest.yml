name: Weekly Digest

on:
  schedule:
    # Runs every Friday at 08:00 UTC (10:00 Madrid time)
    - cron: "0 8 * * 5"
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit and push data/articles_week.json after this manual run"
        required: false
        type: boolean
        default: true

jobs:
  digest:
    runs-on: ubuntu-latest

    concurrency:
      group: content-store-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write  # Required to commit the reset articles_week.json after digest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly digest ingestion
        run: |
          branch="${{ github.ref_name }}"
          for attempt in 1 2 3; do
            git fetch origin "$branch"
            git reset --hard "origin/$branch"

            NEWSAPI_KEY='${{ secrets.NEWSAPI_KEY }}' \
            GROQ_API_KEY='${{ secrets.GROQ_API_KEY }}' \
            POWER_AUTOMATE_URL='${{ secrets.POWER_AUTOMATE_URL }}' \
            python main.py --mode weekly

            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.commit_changes }}" != "true" ]; then
              echo "workflow_dispatch without commit_changes enabled; skipping commit and push."
              exit 0
            fi

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/articles_week.json
            if git diff --cached --quiet; then
              echo "No weekly store changes to commit."
              exit 0
            fi
            git commit -m "chore: weekly digest store update [skip ci]"

            if git push origin HEAD:"$branch"; then
              exit 0
            fi

            echo "Push attempt $attempt failed; retrying from latest origin/$branch."
          done
          echo "Push failed after 3 attempts."
          exit 1
